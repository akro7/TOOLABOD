name: Build Windows Tool

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pyinstaller

    - name: Build Executable with PyInstaller
      run: |
        # --noconsole: عشان ميتفتحش CMD مع البرنامج
        # --onefile: يجمع كل حاجة في ملف exe واحد
        # --add-data: إضافة ملفات الـ ADB و Fastboot الموجودة في المجلد الأساسي
        # تم حذف heimdall.exe لعدم وجوده في ملفات المشروع
        pyinstaller --noconsole --onefile --name "QuantumDebloater" `
        --add-data "adb.exe;." `
        --add-data "AdbWinApi.dll;." `
        --add-data "AdbWinUsbApi.dll;." `
        --add-data "fastboot.exe;." `
        debloat.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuantumDebloater-Windows
        path: dist/QuantumDebloater.exe
