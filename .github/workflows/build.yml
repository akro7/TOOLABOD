name: Build QuantumDebloater Tool

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller colorama packaging

    - name: Build Executable
      run: |
        # تم إزالة --noconsole لضمان فتح الشاشة
        # تم إبقاء --onefile لسهولة النقل
        pyinstaller --onefile `
        --add-data "adb.exe;." `
        --add-data "AdbWinApi.dll;." `
        --add-data "AdbWinUsbApi.dll;." `
        --add-data "fastboot.exe;." `
        --name "QuantumDebloater_Pro" debloat.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuantumDebloater-Windows
        path: dist/QuantumDebloater_Pro.exe
