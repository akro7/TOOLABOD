name: Build QuantumDebloater Tool

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # تم إضافة المكتبات الأساسية لضمان عمل الواجهة والألوان
        pip install customtkinter pyinstaller colorama packaging

    - name: Build Executable with PyInstaller
      run: |
        # --collect-all: بنجمع مكتبة customtkinter بالكامل لضمان ظهور الألوان والثيمات
        # --uac-admin: لطلب صلاحيات الأدمن عشان الـ ADB والـ Fastboot يشتغلوا صح
        # --clean: بيمسح أي كاش قديم قبل البناء لضمان نسخة نظيفة
        pyinstaller --noconsole --onefile --uac-admin --clean `
        --collect-all customtkinter `
        --add-data "adb.exe;." `
        --add-data "AdbWinApi.dll;." `
        --add-data "AdbWinUsbApi.dll;." `
        --add-data "fastboot.exe;." `
        --name "QuantumDebloater_Pro" debloat.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuantumDebloater-Windows-Build
        path: dist/QuantumDebloater_Pro.exe
